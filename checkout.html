<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>结算 - 智慧农业</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/style.css">
	<script src="js/auth-ui.js"></script>
	<style>
		body { background: #F5F5F5; }
		.checkout-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
		.checkout-container h2 { text-align: center; color: #1B5E20; font-size: 32px; margin-bottom: 30px; }
		.checkout-section { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
		.checkout-section h4 { color: #2E7D32; font-size: 18px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #E8F5E9; }
		.address-select-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid #E0E0E0; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: all .3s; }
		.address-select-item:hover { border-color: #81C784; background: #FAFAFA; }
		.address-select-item.selected { border-color: #2E7D32; background: #F1F8E9; }
		.address-select-item input[type="radio"] { margin-top: 3px; accent-color: #2E7D32; }
		.address-select-item .addr-info { flex:1; }
		.address-select-item .addr-info .name { font-weight: 700; color: #333; margin-bottom: 4px; }
		.address-select-item .addr-info .phone { color: #999; margin-left: 12px; }
		.address-select-item .addr-info .full { color: #666; font-size: 14px; }
		.no-address { text-align: center; padding: 30px; color: #999; }
		.no-address a { color: #2E7D32; font-weight: 700; text-decoration: underline; }
		.checkout-product-item { display: flex; gap: 14px; align-items: center; padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
		.checkout-product-item:last-child { border-bottom: none; }
		.checkout-product-item .p-img { width: 70px; height: 70px; border-radius: 10px; background: #E8F5E9; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
		.checkout-product-item .p-img img { width:100%;height:100%;object-fit:cover;border-radius:10px; }
		.checkout-product-item .p-info { flex:1; }
		.checkout-product-item .p-info h5 { color: #333; margin-bottom: 4px; font-size: 15px; }
		.checkout-product-item .p-info .p-meta { color: #999; font-size: 13px; }
		.checkout-product-item .p-price { font-weight: 700; color: #E53935; font-size: 17px; white-space: nowrap; }
		.checkout-summary { display: flex; justify-content: flex-end; align-items: center; padding: 16px 0 0; gap: 8px; }
		.checkout-summary .label { color: #666; font-size: 15px; }
		.checkout-summary .amount { color: #E53935; font-size: 28px; font-weight: 700; }
		.checkout-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
		.checkout-actions button { padding: 14px 36px; border-radius: 999px; font-family: 'Arimo', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; border: none; transition: all .3s; }
		.btn-pay { background: #2E7D32; color: #fff; font-size: 16px; padding: 16px 50px; }
		.btn-pay:hover { background: #1B5E20; }
		.btn-pay:disabled { background: #BBB; cursor: not-allowed; }
		.btn-cancel-order { background: #fff; color: #E53935; border: 2px solid #E53935 !important; }
		.btn-cancel-order:hover { background: #FFEBEE; }
		.btn-back-shop { background: #fff; color: #2E7D32; border: 2px solid #2E7D32 !important; }
		.btn-back-shop:hover { background: #E8F5E9; }
		.btn-save-order { background: #fff; color: #F57C00; border: 2px solid #F57C00 !important; }
		.btn-save-order:hover { background: #FFF3E0; }
		.btn-save-order:disabled { border-color: #BBB !important; color: #BBB; cursor: not-allowed; }
		.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2E7D32; color: #fff; padding: 14px 28px; border-radius: 999px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; font-family: 'Arimo', sans-serif; font-weight: 700; }
		.toast.show { opacity: 1; }
		.result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
		.result-overlay.show { display: flex; }
		.result-card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; width: 90%; }
		.result-card .icon { font-size: 80px; margin-bottom: 16px; }
		.result-card h3 { color: #333; margin-bottom: 8px; }
		.result-card p { color: #666; margin-bottom: 24px; }
		.result-card button { padding: 12px 32px; border-radius: 999px; border: none; background: #2E7D32; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Arimo', sans-serif; }
		.result-card button:hover { background: #1B5E20; }
		.loading { text-align:center; padding:40px; color:#999; font-size:15px; }
	</style>
</head>
<body>
	<div id="toast" class="toast"></div>
	<div class="result-overlay" id="resultOverlay">
		<div class="result-card">
			<div class="icon" id="resultIcon">✅</div>
			<h3 id="resultTitle">操作成功</h3>
			<p id="resultMsg"></p>
			<button id="resultBtn" onclick="closeResult()" data-i18n="checkout.result_ok">确 定</button>
		</div>
	</div>

	<header id="top">
		<div class="wrapper">
			<h1 class="logo"><a href="index.html" data-i18n="brand.name">智慧农业</a></h1>
			<nav>
				<ul id="navigation">
					<li><a href="index.html" data-i18n="nav.back">返回首页</a></li>
					<li><a href="shop.html" data-i18n="nav.shop">电商直销</a></li>
					<li><a class="nav-cta" href="login.html" data-i18n="nav.login">登录/注册</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<div class="checkout-container">
		<h2 data-i18n="checkout.title">📋 确认订单</h2>

		<div class="checkout-section">
			<h4 data-i18n="checkout.addr_title">📍 收货地址</h4>
			<div id="addressArea"><div class="loading" data-i18n="user.loading">加载中...</div></div>
		</div>

		<div class="checkout-section">
			<h4 data-i18n="checkout.product_title">🛒 商品清单</h4>
			<div id="productArea"><div class="loading" data-i18n="user.loading">加载中...</div></div>
			<div id="summaryArea" style="display:none;">
				<div class="checkout-summary">
					<span class="label" data-i18n="checkout.total">合计：</span>
					<span class="amount" id="totalAmount">¥0</span>
				</div>
			</div>
		</div>

		<div class="checkout-actions">
			<button class="btn-back-shop" onclick="goBackShop()" data-i18n="checkout.btn_continue">← 继续购物</button>
			<button class="btn-cancel-order" id="btnCancelOrder" onclick="cancelOrder()" data-i18n="checkout.btn_cancel">🗑 放弃订单</button>
			<button class="btn-save-order" id="btnSaveOrder" onclick="saveOrder()" data-i18n="checkout.btn_save">💾 保存订单</button>
			<button class="btn-pay" id="btnPay" onclick="payOrder()" data-i18n="checkout.btn_pay">💰 去付款</button>
		</div>
	</div>

	<footer>
		<div class="wrapper">
			<a class="logo" href="index.html" data-i18n="brand.name">智慧农业</a>
			<div class="footer-left">
				<p class="copyright">版权所有 &copy; 2026 智慧农业集成平台</p>
			</div>
			<div class="clear"></div>
		</div>
	</footer>

	<script src="js/i18n.js"></script>
	<script>
		const API_BASE = window.location.origin + '/api';
		const token = localStorage.getItem('chase_shop_token');
		const userStr = localStorage.getItem('chase_shop_user');
		const user = userStr ? JSON.parse(userStr) : null;
		const T = function(k,p){return (window.i18n&&window.i18n.t)?window.i18n.t(k,p):k;};

		const urlParams = new URLSearchParams(window.location.search);
		const cartIdsStr = urlParams.get('cart_ids');
		let cartIds = [], currentOrderId = null;

		if (!token) { window.location.href = 'login.html?redirect=checkout.html'; }
		if (cartIdsStr) { cartIds = cartIdsStr.split(',').map(Number).filter(n => !isNaN(n)); }
		if (cartIds.length === 0) { setTimeout(() => { window.location.href = 'shop.html'; }, 500); }

		function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

		function showResult(icon, title, msg, callback) {
			document.getElementById('resultIcon').textContent = icon;
			document.getElementById('resultTitle').textContent = title;
			document.getElementById('resultMsg').textContent = msg;
			document.getElementById('resultOverlay').classList.add('show');
			document.getElementById('resultBtn').onclick = function() { closeResult(); if(callback) callback(); };
		}
		function closeResult() { document.getElementById('resultOverlay').classList.remove('show'); }

		let addresses = [], selectedAddrId = null;

		async function loadAddresses() {
			const container = document.getElementById('addressArea');
			try {
				const res = await fetch(API_BASE + '/addresses', { headers: { 'Authorization': 'Bearer ' + token } });
				const data = await res.json();
				if (data.code === 200 && data.data.length > 0) {
					addresses = data.data;
					const defaultAddr = addresses.find(a => a.is_default) || addresses[0];
					selectedAddrId = defaultAddr.id;
					container.innerHTML = addresses.map(a => '<div class="address-select-item '+(a.id===selectedAddrId?'selected':'')+'" onclick="selectAddress('+a.id+')">'+
						'<input type="radio" name="address" value="'+a.id+'" '+(a.id===selectedAddrId?'checked':'')+'>'+
						'<div class="addr-info"><div class="name">'+a.receiver_name+'<span class="phone">'+a.receiver_phone+'</span></div>'+
						'<div class="full">'+a.province+a.city+a.district+' '+a.detail+'</div>'+
						(a.is_default?'<span style="display:inline-block;background:#E8F5E9;color:#2E7D32;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;margin-top:6px;">'+T('checkout.default')+'</span>':'')+
						'</div></div>').join('');
				} else {
					container.innerHTML = '<div class="no-address">'+T('checkout.no_addr')+' <a href="user-center.html">'+T('checkout.personal_center')+'</a>'+T('checkout.add_addr')+'</div>';
				}
			} catch (err) { container.innerHTML = '<div class="no-address" style="color:#E53935;">'+T('user.load_failed')+'</div>'; }
		}

		function selectAddress(id) {
			selectedAddrId = id;
			document.querySelectorAll('.address-select-item').forEach(el => el.classList.remove('selected'));
			document.querySelector('.address-select-item input[value="'+id+'"]').parentElement.classList.add('selected');
			document.querySelector('.address-select-item input[value="'+id+'"]').checked = true;
		}

		let cartProducts = [], totalAmount = 0;

		async function loadCartProducts() {
			const container = document.getElementById('productArea');
			try {
				const res = await fetch(API_BASE + '/cart', { headers: { 'Authorization': 'Bearer ' + token } });
				const data = await res.json();
				if (data.code === 200) {
					const allItems = data.data;
					cartProducts = allItems.filter(item => cartIds.includes(item.id));
					if (cartProducts.length === 0) {
						container.innerHTML = '<div class="no-address">'+T('checkout.cart_invalid')+' <a href="shop.html">'+T('checkout.shop')+'</a></div>';
						return;
					}
					container.innerHTML = cartProducts.map(p => {
						const subtotal = p.price * p.quantity;
						return '<div class="checkout-product-item">'+
							'<div class="p-img">'+(p.product_image?'<img src="'+p.product_image+'" alt="'+p.product_name+'">':'🍑')+'</div>'+
							'<div class="p-info"><h5>'+p.product_name+'</h5><div class="p-meta">'+T('checkout.qty',{price:p.price,qty:p.quantity})+'</div></div>'+
							'<div class="p-price">¥'+subtotal.toFixed(2)+'</div></div>';
					}).join('');
					totalAmount = cartProducts.reduce((sum, p) => sum + p.price * p.quantity, 0);
					document.getElementById('totalAmount').textContent = '¥' + totalAmount.toFixed(2);
					document.getElementById('summaryArea').style.display = 'block';
				} else { container.innerHTML = '<div class="no-address">'+T('user.load_failed')+'</div>'; }
			} catch (err) { container.innerHTML = '<div class="no-address" style="color:#E53935;">'+T('user.load_failed')+'</div>'; }
		}

		async function createOrder() {
			if (!selectedAddrId) { showToast(T('checkout.select_addr')); return null; }
			try {
				const res = await fetch(API_BASE + '/orders', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ address_id: selectedAddrId, cart_ids: cartIds }) });
				const data = await res.json();
				if (data.code === 200) { currentOrderId = data.data.order_id; return data.data; }
				else { showToast(data.msg || T('checkout.err_create')); return null; }
			} catch (err) { showToast(T('checkout.err_network')); return null; }
		}

		async function payOrder() {
			if (!selectedAddrId) { showToast(T('checkout.select_addr')); return; }
			if (cartProducts.length === 0) { showToast(T('checkout.product_expired')); return; }
			const btn = document.getElementById('btnPay');
			btn.disabled = true; btn.textContent = T('checkout.btn_processing');
			document.getElementById('btnCancelOrder').disabled = true;
			const orderData = await createOrder();
			btn.disabled = false; btn.textContent = T('checkout.btn_pay');
			document.getElementById('btnCancelOrder').disabled = false;
			if (!orderData) return;
			try {
				const res = await fetch(API_BASE + '/orders/' + orderData.order_id + '/pay', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } });
				const payData = await res.json();
				if (payData.code === 200) {
					showResult('✅', T('checkout.result_success'), T('checkout.result_order_no',{no:orderData.order_no})+'\n'+T('checkout.result_amount',{amount:orderData.total_amount})+'\n'+T('checkout.result_shipping'), () => { window.location.href = 'user-center.html'; });
				} else { showToast(payData.msg || T('checkout.pay_fail')); }
			} catch (err) { showToast(T('checkout.pay_req_fail')); }
		}

		async function cancelOrder() {
			if (!confirm(T('checkout.cancel_confirm'))) return;
			if (currentOrderId) { try { await fetch(API_BASE + '/orders/' + currentOrderId + '/cancel', { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e){} }
			try { await fetch(API_BASE + '/cart', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e){}
			showResult('🗑', T('checkout.cancel_result'), T('checkout.cancel_msg'), () => { window.location.href = 'shop.html'; });
		}

		async function saveOrder() {
			if (!selectedAddrId) { showToast(T('checkout.select_addr')); return; }
			if (cartProducts.length === 0) { showToast(T('checkout.product_expired')); return; }
			const btn = document.getElementById('btnSaveOrder');
			btn.disabled = true; btn.textContent = T('checkout.btn_processing');
			const orderData = await createOrder();
			btn.disabled = false; btn.textContent = T('checkout.btn_save');
			if (orderData) {
				showResult('💾', T('checkout.save_result'), T('checkout.result_order_no',{no:orderData.order_no})+'\n'+T('checkout.result_amount',{amount:orderData.total_amount})+'\n'+T('checkout.save_msg'), () => { window.location.href = 'user-center.html'; });
			}
		}

		function goBackShop() { window.location.href = 'shop.html'; }

		loadAddresses();
		loadCartProducts();
	</script>
</body>
</html>
