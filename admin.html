<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>管理后台 - 智慧农业</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/style.css">
	<script src="js/auth-ui.js"></script>
	<style>
		body { background: #F5F5F5; }
		.admin-header { background: #1B5E20; color: #fff; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
		.admin-header h2 { margin: 0; font-size: 20px; }
		.admin-header .user-info { font-size: 14px; }
		.admin-header .user-info a { color: #C8E6C9; text-decoration: none; margin-left: 16px; }
		.admin-layout { display: flex; min-height: calc(100vh - 56px); }
		.admin-sidebar { width: 220px; background: #fff; border-right: 1px solid #E0E0E0; padding: 20px 0; }
		.admin-sidebar a { display: block; padding: 12px 30px; color: #333; text-decoration: none; font-size: 15px; font-weight: 700; transition: all .3s; border-left: 3px solid transparent; }
		.admin-sidebar a:hover, .admin-sidebar a.active { color: #2E7D32; background: #F1F8E9; border-left-color: #2E7D32; }
		.admin-main { flex: 1; padding: 30px; overflow-y: auto; }
		.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
		.stat-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
		.stat-card .value { font-size: 32px; font-weight: 700; color: #2E7D32; }
		.stat-card .label { color: #999; font-size: 14px; margin-top: 4px; }
		.table-container { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
		table { width: 100%; border-collapse: collapse; }
		th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #F0F0F0; font-size: 14px; }
		th { background: #F9F9F9; color: #666; font-weight: 700; font-size: 13px; }
		tr:hover { background: #FAFAFA; }
		.badge { display: inline-block; padding: 3px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
		.badge-admin { background: #FFE0B2; color: #E65100; } .badge-user { background: #E8F5E9; color: #2E7D32; }
		.badge-pending { background: #FFF3E0; color: #F57C00; } .badge-paid { background: #E3F2FD; color: #1976D2; }
		.badge-shipped { background: #E8F5E9; color: #388E3C; } .badge-completed { background: #E8F5E9; color: #2E7D32; }
		.badge-cancelled { background: #F5F5F5; color: #999; }
		.badge-refunding { background: #FFE0B2; color: #E65100; } .badge-refunded { background: #F5F5F5; color: #999; }
		.badge-on { background: #E8F5E9; color: #2E7D32; } .badge-off { background: #F5F5F5; color: #999; }
		.form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
		.form-row .field { flex: 1; min-width: 120px; }
		.form-row .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 700; }
		.form-row .field input, .form-row .field select, .form-row .field textarea { width: 100%; padding: 8px 12px; border: 2px solid #E0E0E0; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; font-family: 'Arimo',sans-serif; }
		.form-row .field input:focus, .form-row .field select:focus, .form-row .field textarea:focus { border-color: #2E7D32; }
		.form-row .field textarea { resize: vertical; min-height: 60px; }
		.btn-sm { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; font-family: 'Arimo', sans-serif; }
		.btn-success { background: #2E7D32; color: #fff; } .btn-success:hover { background: #1B5E20; }
		.btn-danger { background: #E53935; color: #fff; } .btn-danger:hover { background: #C62828; }
		.btn-outline { background: #fff; border: 2px solid #2E7D32; color: #2E7D32; } .btn-outline:hover { background: #E8F5E9; }
		.btn-warning { background: #F57C00; color: #fff; } .btn-warning:hover { background: #E65100; }
		.search-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
		.search-row input, .search-row select { padding: 10px 16px; border: 2px solid #E0E0E0; border-radius: 8px; font-size: 14px; outline: none; }
		.search-row input:focus, .search-row select:focus { border-color: #2E7D32; }
		.search-row button { padding: 10px 24px; background: #2E7D32; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: 'Arimo', sans-serif; }
		.pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; }
		.pagination button { padding: 8px 16px; border: 2px solid #C8E6C9; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; color: #2E7D32; }
		.pagination button.active { background: #2E7D32; color: #fff; border-color: #2E7D32; }
		.pagination button:disabled { color: #CCC; cursor: not-allowed; }
		.page-title { color: #1B5E20; font-size: 24px; margin-bottom: 20px; }
		.empty { text-align: center; padding: 40px; color: #999; }
		.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2E7D32; color: #fff; padding: 12px 28px; border-radius: 999px; z-index: 10000; font-weight: 700; opacity: 0; transition: opacity .3s; pointer-events: none; }
		.toast.show { opacity: 1; }
		.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; align-items:center; justify-content:center; }
		.modal-overlay.show { display: flex; }
		.modal-box { background: #fff; border-radius: 16px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
		.modal-box h3 { color: #2E7D32; margin-bottom: 16px; }
		.modal-box .close-btn { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
	</style>
</head>
<body>
	<div id="toast" class="toast"></div>
	<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalContent"></div></div>

	<div class="admin-header">
		<h2 data-i18n="admin.header">🌾 智慧农业 - 管理后台</h2>
		<div class="user-info">
			<span id="adminName">管理员</span>
			<a href="index.html" data-i18n="admin.return">返回前台</a>
			<a href="#" onclick="logout()" data-i18n="admin.logout">退出登录</a>
		</div>
	</div>

	<div class="admin-layout">
		<div class="admin-sidebar">
			<a href="#" class="active" data-page="dashboard" onclick="switchPage('dashboard')" data-i18n="admin.dashboard">📊 数据概览</a>
			<a href="#" data-page="users" onclick="switchPage('users')" data-i18n="admin.users">👥 用户管理</a>
			<a href="#" data-page="products" onclick="switchPage('products')" data-i18n="admin.products">📦 商品管理</a>
			<a href="#" data-page="categories" onclick="switchPage('categories')" data-i18n="admin.categories">🏷️ 分类管理</a>
			<a href="#" data-page="orders" onclick="switchPage('orders')" data-i18n="admin.orders">📋 订单管理</a>
		</div>
		<div class="admin-main" id="mainContent"><div class="empty" data-i18n="user.loading">加载中...</div></div>
	</div>

	<script src="js/i18n.js"></script>
	<script>
		const API_BASE = window.location.origin + '/api';
		const token = localStorage.getItem('chase_shop_token');
		const userStr = localStorage.getItem('chase_shop_user');
		const user = userStr ? JSON.parse(userStr) : null;
		const T = function(k,p){return (window.i18n&&window.i18n.t)?window.i18n.t(k,p):k;};

		if (!token) { window.location.href = 'login.html?redirect=admin.html'; }
		if (user) { document.getElementById('adminName').textContent = user.name || user.username; }

		function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
		function logout() { localStorage.removeItem('chase_shop_token'); localStorage.removeItem('chase_shop_user'); window.location.href = 'login.html'; }

		function switchPage(page) {
			document.querySelectorAll('.admin-sidebar a').forEach(a => a.classList.remove('active'));
			document.querySelector('[data-page="'+page+'"]').classList.add('active');
			if(page==='dashboard')loadDashboard();else if(page==='users')loadUserList();
			else if(page==='products')loadProductList();else if(page==='categories')loadCategoryList();
			else if(page==='orders')loadOrderList();
		}

		async function api(url, options={}) {
			options.headers = { ...options.headers, 'Authorization': 'Bearer ' + token };
			const res = await fetch(API_BASE + url, options); return res.json();
		}

		async function loadDashboard() {
			const container = document.getElementById('mainContent');
			try {
				const data = await api('/admin/stats');
				if (data.code === 200) {
					const s = data.data;
					container.innerHTML = '<h3 class="page-title">'+T('admin.dashboard')+'</h3><div class="stats-grid">'+
						'<div class="stat-card"><div class="value">'+s.userCount+'</div><div class="label">'+T('admin.stats_users')+'</div></div>'+
						'<div class="stat-card"><div class="value">'+s.productCount+'</div><div class="label">'+T('admin.stats_products')+'</div></div>'+
						'<div class="stat-card"><div class="value">'+s.orderCount+'</div><div class="label">'+T('admin.stats_orders')+'</div></div>'+
						'<div class="stat-card"><div class="value">¥'+Number(s.totalRevenue).toFixed(2)+'</div><div class="label">'+T('admin.stats_revenue')+'</div></div>'+
						'<div class="stat-card"><div class="value">'+s.pendingOrders+'</div><div class="label">'+T('admin.stats_pending')+'</div></div></div>';
				} else { container.innerHTML = '<div class="empty" style="color:#E53935;">'+(data.msg||T('admin.no_permission'))+'</div>'; }
			} catch (err) { container.innerHTML = '<div class="empty" style="color:#E53935;">'+T('admin.load_failed')+'</div>'; }
		}

		let userPage=1, userKeyword='';
		async function loadUserList() {
			const c=document.getElementById('mainContent');
			c.innerHTML='<h3 class="page-title">'+T('admin.users')+'</h3><div class="search-row"><input type="text" id="userSearch" placeholder="'+T('admin.search_placeholder')+'" value="'+userKeyword+'" onkeydown="if(event.key===\'Enter\')searchUsers()"><button onclick="searchUsers()">'+T('admin.search_btn')+'</button></div><div class="table-container"><div id="userTable"></div></div><div class="pagination" id="userPager"></div>';
			await fetchUsers();
		}
		function searchUsers() { userKeyword = document.getElementById('userSearch').value.trim(); userPage = 1; fetchUsers(); }
		async function fetchUsers() {
			try {
				const params = new URLSearchParams({ page: userPage, pageSize: 15 });
				if (userKeyword) params.append('keyword', userKeyword);
				const data = await api('/admin/users?' + params.toString());
				if (data.code === 200) renderUsers(data.data);
				else document.getElementById('userTable').innerHTML = '<div class="empty" style="color:#E53935;">'+data.msg+'</div>';
			} catch (e) { document.getElementById('userTable').innerHTML = '<div class="empty" style="color:#E53935;">'+T('admin.load_failed')+'</div>'; }
		}
		function renderUsers(r) {
			const c=document.getElementById('userTable');
			if(r.list.length===0){c.innerHTML='<div class="empty">'+T('admin.no_users')+'</div>';document.getElementById('userPager').innerHTML='';return}
			const sm={user:T('admin.role_user'),admin:T('admin.role_admin')};
			c.innerHTML='<table><thead><tr><th>ID</th><th>'+T('login.username')+'</th><th>'+T('user.profile_nickname')+'</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead><tbody>'+r.list.map(u=>'<tr><td>'+u.id+'</td><td>'+u.username+'</td><td>'+(u.name||'-')+'</td><td><span class="badge '+(u.role==='admin'?'badge-admin':'badge-user')+'">'+(sm[u.role]||u.role)+'</span></td><td>'+new Date(u.created_at).toLocaleString('zh-CN')+'</td><td>'+(u.role!=='admin'?'<button class="btn-sm btn-warning" onclick="setAdmin('+u.id+')">'+T('admin.set_admin')+'</button>':'<button class="btn-sm btn-outline" onclick="setUser('+u.id+')">'+T('admin.unset_admin')+'</button>')+(u.role!=='admin'?'<button class="btn-sm btn-danger" onclick="deleteUser('+u.id+')" style="margin-left:6px;">'+T('admin.delete')+'</button>':'')+'</td></tr>').join('')+'</tbody></table>';
			renderPager(r,'userPager','goUserPage');
		}
		function goUserPage(p){userPage=p;fetchUsers();}
		function renderPager(r,pagerId,fn){let pg='';pg+='<button onclick="'+fn+'('+(r.page-1)+')" '+(r.page<=1?'disabled':'')+'>‹</button>';for(let i=1;i<=r.totalPages;i++)pg+='<button class="'+(i===r.page?'active':'')+'" onclick="'+fn+'('+i+')">'+i+'</button>';pg+='<button onclick="'+fn+'('+(r.page+1)+')" '+(r.page>=r.totalPages?'disabled':'')+'>›</button>';document.getElementById(pagerId).innerHTML=pg;}
		async function setAdmin(uid){if(!confirm(T('admin.confirm_admin')))return;const d=await api('/admin/users/'+uid+'/role',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:'admin'})});if(d.code===200){showToast(T('admin.toast_admin_set'));fetchUsers()}else showToast(d.msg)}
		async function setUser(uid){if(!confirm(T('admin.confirm_unadmin')))return;const d=await api('/admin/users/'+uid+'/role',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:'user'})});if(d.code===200){showToast(T('admin.toast_admin_unset'));fetchUsers()}else showToast(d.msg)}
		async function deleteUser(uid){if(!confirm(T('admin.confirm_delete_user')))return;const d=await api('/admin/users/'+uid,{method:'DELETE'});if(d.code===200){showToast(T('admin.toast_user_deleted'));fetchUsers()}else showToast(d.msg)}

		let productPage=1,productKeyword='',productCategory='',productOnSale='';
		async function loadProductList(){
			const c=document.getElementById('mainContent');
			c.innerHTML='<h3 class="page-title">'+T('admin.products')+'</h3><div class="search-row"><input id="productSearch" placeholder="'+T('admin.product_search_ph')+'" value="'+productKeyword+'"><select id="productCategoryFilter"><option value="">'+T('admin.all_cats')+'</option></select><select id="productOnSaleFilter"><option value="">'+T('admin.all_status')+'</option><option value="1">'+T('admin.on_sale')+'</option><option value="0">'+T('admin.off_sale')+'</option></select><button onclick="searchProducts()">'+T('admin.search_btn')+'</button><button onclick="showProductForm()" style="background:#F57C00">'+T('admin.add_product')+'</button></div><div class="table-container"><div id="productTable"></div></div><div class="pagination" id="productPager"></div>';
			loadCategoryOptions();fetchProducts();
		}
		async function loadCategoryOptions(){try{const d=await api('/admin/categories');if(d.code===200){const s=document.getElementById('productCategoryFilter');d.data.forEach(c=>{s.innerHTML+='<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>'});if(productCategory)s.value=productCategory}}catch(e){}}
		function searchProducts(){productKeyword=document.getElementById('productSearch').value.trim();productCategory=document.getElementById('productCategoryFilter').value;productOnSale=document.getElementById('productOnSaleFilter').value;productPage=1;fetchProducts()}
		async function fetchProducts(){
			try{const p=new URLSearchParams({page:productPage,pageSize:15});if(productKeyword)p.append('keyword',productKeyword);if(productCategory)p.append('category_id',productCategory);if(productOnSale!=='')p.append('is_on_sale',productOnSale);const d=await api('/admin/products?'+p.toString());if(d.code===200)renderProducts(d.data);else document.getElementById('productTable').innerHTML='<div class="empty" style="color:#E53935;">'+d.msg+'</div>'}catch(e){document.getElementById('productTable').innerHTML='<div class="empty" style="color:#E53935;">'+T('admin.load_failed')+'</div>'}
		}
		function renderProducts(r){
			const c=document.getElementById('productTable');
			if(r.list.length===0){c.innerHTML='<div class="empty">'+T('admin.no_products')+'</div>';document.getElementById('productPager').innerHTML='';return}
			c.innerHTML='<table><thead><tr><th>ID</th><th>'+T('admin.product_name')+'</th><th>'+T('admin.category')+'</th><th>'+T('admin.price')+'</th><th>'+T('admin.stock')+'</th><th>销量</th><th>状态</th><th>操作</th></tr></thead><tbody>'+r.list.map(p=>'<tr><td>'+p.id+'</td><td>'+p.name+'</td><td>'+(p.category_name||'-')+'</td><td>¥'+p.price+'</td><td>'+p.stock+'</td><td>'+p.sales+'</td><td><span class="badge '+(p.is_on_sale?'badge-on':'badge-off')+'">'+(p.is_on_sale?T('admin.on'):T('admin.off'))+'</span></td><td><button class="btn-sm btn-outline" onclick="showProductForm('+p.id+')">'+T('admin.edit')+'</button> <button class="btn-sm '+(p.is_on_sale?'btn-warning':'btn-success')+'" onclick="toggleProduct('+p.id+')">'+(p.is_on_sale?T('admin.toggle_off'):T('admin.toggle_on'))+'</button> <button class="btn-sm btn-danger" onclick="deleteProduct('+p.id+')">'+T('admin.delete')+'</button></td></tr>').join('')+'</tbody></table>';
			renderPager(r,'productPager','goProductPage');
		}
		function goProductPage(p){productPage=p;fetchProducts();}
		async function showProductForm(editId){
			let title=editId?T('admin.edit_product_title'):T('admin.add_product_title'),pp={name:'',description:'',price:'',original_price:'',stock:'',image:'',category_id:'',badge:'',weight:'',specs:'',is_featured:0,is_on_sale:1};
			if(editId){const d=await api('/admin/products?pageSize=200');if(d.code===200){const f=d.data.list.find(x=>x.id===editId);if(f)pp=f}}
			try{const cd=await api('/admin/categories');const catOpts=cd.code===200?cd.data.map(c=>'<option value="'+c.id+'"'+(pp.category_id==c.id?' selected':'')+'>'+c.icon+' '+c.name+'</option>').join(''):'';
			document.getElementById('modalContent').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>'+title+'</h3><form id="productForm"><div class="form-row"><div class="field"><label>'+T('admin.product_name')+'</label><input name="name" value="'+pp.name+'" required></div><div class="field"><label>'+T('admin.category')+'</label><select name="category_id"><option value="">无</option>'+catOpts+'</select></div></div><div class="form-row"><div class="field"><label>'+T('admin.price')+'</label><input name="price" type="number" step="0.01" value="'+pp.price+'"></div><div class="field"><label>'+T('admin.original_price')+'</label><input name="original_price" type="number" step="0.01" value="'+(pp.original_price||'')+'"></div><div class="field"><label>'+T('admin.stock')+'</label><input name="stock" type="number" value="'+(pp.stock||0)+'"></div></div><div class="form-row"><div class="field"><label>'+T('admin.badge')+'</label><input name="badge" value="'+(pp.badge||'')+'"></div><div class="field"><label>'+T('admin.weight')+'</label><input name="weight" value="'+(pp.weight||'')+'"></div><div class="field"><label>'+T('admin.featured')+'</label><select name="is_featured"><option value="0"'+(pp.is_featured==0?' selected':'')+'>否</option><option value="1"'+(pp.is_featured==1?' selected':'')+'>是</option></select></div></div><div class="form-row"><div class="field"><label>商品图片</label><div style="display:flex;gap:6px;"><input name="image" id="productImageInput" value="'+(pp.image||'')+'" placeholder="图片URL或点击上传" style="flex:1;"><input type="file" id="productImageFile" accept="image/*" style="display:none;" onchange="uploadProductImage()"><button type="button" class="btn-sm btn-outline" onclick="document.getElementById(\'productImageFile\').click()" style="white-space:nowrap;">📷 上传</button></div>'+(pp.image?'<div style="margin-top:6px;"><img src="'+pp.image+'" style="max-width:120px;max-height:80px;border-radius:8px;border:1px solid #E0E0E0;"></div>':'')+'</div></div><div class="form-row"><div class="field"><label>'+T('admin.description')+'</label><textarea name="description" rows="2">'+(pp.description||'')+'</textarea></div></div><div class="form-row"><div class="field"><label>'+T('admin.specs')+'</label><textarea name="specs" rows="3">'+(pp.specs||'')+'</textarea></div></div><button type="submit" class="btn-sm btn-success" style="padding:10px 24px;font-size:14px;">'+T('user.btn_save')+'</button>'+(editId?'<button type="button" class="btn-sm btn-danger" style="margin-left:8px;padding:10px 24px;font-size:14px;" onclick="deleteProduct('+editId+');closeModal()">'+T('admin.delete')+'</button>':'')+'</form>';
			document.getElementById('productForm').addEventListener('submit',async function(e){e.preventDefault();const fd=new FormData(this);const body={};for(let[k,v]of fd)body[k]=v;body.is_featured=parseInt(body.is_featured);body.category_id=body.category_id||null;body.price=parseFloat(body.price);body.original_price=body.original_price?parseFloat(body.original_price):null;body.stock=parseInt(body.stock);const url=editId?'/admin/products/'+editId:'/admin/products';const method=editId?'PUT':'POST';const r=await api(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(r.code===200){showToast(title.replace('添加商品','商品')+T('user.btn_save').replace('保 存','成功'));closeModal();fetchProducts()}else showToast(r.msg)});
			document.getElementById('modalOverlay').classList.add('show')}catch(e){showToast(T('admin.load_failed'))}
		}

		async function uploadProductImage() {
			const fileInput = document.getElementById('productImageFile');
			const file = fileInput.files[0];
			if (!file) return;
			if (!file.type.startsWith('image/')) { showToast('请选择图片文件'); return; }
			if (file.size > 5 * 1024 * 1024) { showToast('图片大小不能超过 5MB'); return; }
			showToast('上传中...');
			const fd = new FormData();
			fd.append('file', file);
			try {
				const res = await fetch(API_BASE + '/upload', {
					method: 'POST',
					headers: { 'Authorization': 'Bearer ' + token },
					body: fd
				});
				const data = await res.json();
				if (data.code === 200) {
					document.getElementById('productImageInput').value = data.data.url;
					showToast('图片上传成功');
				} else {
					showToast(data.msg || '上传失败');
				}
			} catch (err) {
				showToast('上传失败：网络错误');
			}
		}
		async function toggleProduct(id){const d=await api('/admin/products/'+id+'/toggle',{method:'PUT'});if(d.code===200){showToast(d.msg);fetchProducts()}else showToast(d.msg)}
		async function deleteProduct(id){if(!confirm(T('admin.confirm_delete_product')))return;const d=await api('/admin/products/'+id,{method:'DELETE'});if(d.code===200){showToast(T('admin.toast_product_deleted'));fetchProducts()}else showToast(d.msg)}

		async function loadCategoryList(){
			const c=document.getElementById('mainContent');
			c.innerHTML='<h3 class="page-title">'+T('admin.categories')+'</h3><button class="btn-sm btn-warning" onclick="showCategoryForm()" style="padding:8px 20px;margin-bottom:12px;">'+T('admin.add_cat')+'</button><div class="table-container"><div id="categoryTable"></div></div>';
			fetchCategories()
		}
		async function fetchCategories(){
			try{const d=await api('/admin/categories');if(d.code===200){const tbl=document.getElementById('categoryTable');if(d.data.length===0){tbl.innerHTML='<div class="empty">'+T('admin.no_categories')+'</div>';return}
			tbl.innerHTML='<table><thead><tr><th>ID</th><th>图标</th><th>名称</th><th>排序</th><th>操作</th></tr></thead><tbody>'+d.data.map(c=>'<tr><td>'+c.id+'</td><td>'+c.icon+'</td><td>'+c.name+'</td><td>'+c.sort_order+'</td><td><button class="btn-sm btn-outline" onclick="showCategoryForm('+c.id+')">'+T('admin.edit')+'</button> <button class="btn-sm btn-danger" onclick="deleteCategory('+c.id+')">'+T('admin.delete')+'</button></td></tr>').join('')+'</tbody></table>'}else tbl.innerHTML='<div class="empty" style="color:#E53935;">'+d.msg+'</div>'}catch(e){document.getElementById('categoryTable').innerHTML='<div class="empty" style="color:#E53935;">'+T('admin.load_failed')+'</div>'}
		}
		function showCategoryForm(editId){
			let title=editId?T('admin.edit_cat_title'):T('admin.add_cat_title'),cc={name:'',icon:'',sort_order:0};
			if(editId){title=T('admin.edit_cat_title');api('/admin/categories').then(d=>{if(d.code===200){const f=d.data.find(x=>x.id===editId);if(f)cc=f;renderCatForm()}}).catch(()=>{});renderCatForm();return}
			renderCatForm();
			function renderCatForm(){
				document.getElementById('modalContent').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>'+title+'</h3><form id="catForm"><div class="form-row"><div class="field"><label>'+T('admin.category')+'</label><input id="catName" value="'+cc.name+'" required></div><div class="field"><label>图标（emoji）</label><input id="catIcon" value="'+cc.icon+'"></div><div class="field"><label>排序</label><input id="catSort" type="number" value="'+cc.sort_order+'"></div></div><button type="submit" class="btn-sm btn-success" style="padding:10px 24px;font-size:14px;">'+T('user.btn_save')+'</button></form>';
				document.getElementById('catForm').addEventListener('submit',async function(e){e.preventDefault();const body={name:document.getElementById('catName').value.trim(),icon:document.getElementById('catIcon').value.trim(),sort_order:parseInt(document.getElementById('catSort').value)||0};if(!body.name)return showToast('名称必填');const url=editId?'/admin/categories/'+editId:'/admin/categories';const method=editId?'PUT':'POST';const r=await api(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(r.code===200){showToast(title+('成功'));closeModal();fetchCategories()}else showToast(r.msg)});
				document.getElementById('modalOverlay').classList.add('show')
			}
		}
		async function deleteCategory(id){if(!confirm(T('admin.confirm_delete_cat')))return;const d=await api('/admin/categories/'+id,{method:'DELETE'});if(d.code===200){showToast(T('admin.toast_cat_deleted'));fetchCategories()}else showToast(d.msg)}

		// ==================== 订单管理（含退款处理）====================
		let orderPage = 1, orderStatus = '', orderKeyword = '';
		async function loadOrderList() {
			const c=document.getElementById('mainContent');
			c.innerHTML='<h3 class="page-title">'+T('admin.orders')+'</h3><div class="search-row"><select id="orderStatusFilter" onchange="filterOrders()"><option value="">'+T('admin.all_status')+'</option><option value="pending">'+T('admin.status_pending')+'</option><option value="paid">'+T('admin.status_paid')+'</option><option value="shipped">'+T('admin.status_shipped')+'</option><option value="completed">'+T('admin.status_completed')+'</option><option value="cancelled">'+T('admin.status_cancelled')+'</option><option value="refunding">退款中</option><option value="refunded">已退款</option></select><input type="text" id="orderSearch" placeholder="'+T('admin.order_search_ph')+'" value="'+orderKeyword+'" onkeydown="if(event.key===\'Enter\')searchOrders()"><button onclick="searchOrders()">'+T('admin.search_btn')+'</button></div><div class="table-container"><div id="orderTable"></div></div><div class="pagination" id="orderPager"></div>';
			await fetchOrders();
		}
		function filterOrders(){orderStatus=document.getElementById('orderStatusFilter').value;orderPage=1;fetchOrders();}
		function searchOrders(){orderKeyword=document.getElementById('orderSearch').value.trim();orderPage=1;fetchOrders();}
		async function fetchOrders(){
			try{const p=new URLSearchParams({page:orderPage,pageSize:15});if(orderStatus)p.append('status',orderStatus);if(orderKeyword)p.append('keyword',orderKeyword);const d=await api('/admin/orders?'+p.toString());if(d.code===200)renderOrders(d.data);else document.getElementById('orderTable').innerHTML='<div class="empty" style="color:#E53935;">'+d.msg+'</div>'}catch(e){document.getElementById('orderTable').innerHTML='<div class="empty" style="color:#E53935;">'+T('admin.load_failed')+'</div>'}
		}
		const osm={pending:T('admin.status_pending'),paid:T('admin.status_paid'),shipped:T('admin.status_shipped'),delivered:T('user.status_delivered'),completed:T('admin.status_completed'),cancelled:T('admin.status_cancelled'),refunding:'退款中',refunded:'已退款'};
		function renderOrders(r){
			const c=document.getElementById('orderTable');
			if(r.list.length===0){c.innerHTML='<div class="empty">'+T('admin.no_orders')+'</div>';document.getElementById('orderPager').innerHTML='';return}
			c.innerHTML='<table><thead><tr><th>ID</th><th>'+T('user.order_no')+'</th><th>'+T('login.username')+'</th><th>'+T('user.addr_name')+'</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody>'+r.list.map(o=>{
				let actions = '<button class="btn-sm btn-outline" onclick="viewOrderDetail('+o.id+')">'+T('admin.detail')+'</button>';
				if (o.status==='paid') actions += '<button class="btn-sm btn-success" onclick="updateOrderStatus('+o.id+',\'shipped\')" style="margin-left:4px;">'+T('admin.ship')+'</button>';
				if (o.status==='shipped') actions += '<button class="btn-sm btn-success" onclick="updateOrderStatus('+o.id+',\'completed\')" style="margin-left:4px;">'+T('admin.complete')+'</button>';
				if (o.status==='refunding') actions += '<button class="btn-sm btn-danger" onclick="approveRefund('+o.id+')" style="margin-left:4px;">同意退款</button>';
				return '<tr><td>'+o.id+'</td><td title="'+o.order_no+'">'+o.order_no.substring(o.order_no.length-12)+'</td><td>'+(o.username||'ID:'+o.user_id)+'</td><td>'+o.receiver_name+'<br><small style="color:#999;">'+o.receiver_phone+'</small></td><td style="font-weight:700;color:#E53935;">¥'+o.total_amount+'</td><td><span class="badge badge-'+o.status+'">'+(osm[o.status]||o.status)+'</span></td><td>'+new Date(o.created_at).toLocaleString('zh-CN')+'</td><td>'+actions+'</td></tr>';
			}).join('')+'</tbody></table>';
			renderPager(r,'orderPager','goOrderPage');
		}
		function goOrderPage(p){orderPage=p;fetchOrders();}
		async function updateOrderStatus(oid,status){
			const lb={shipped:T('admin.confirm_ship'),completed:T('admin.confirm_complete')};
			if(!confirm((lb[status]||T('admin.confirm_update'))+'？'))return;
			const d=await api('/admin/orders/'+oid+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
			if(d.code===200){showToast(T('admin.toast_status_updated'));fetchOrders()}else showToast(d.msg)
		}
		async function approveRefund(oid) {
			if (!confirm('确认退款？系统将自动恢复库存。')) return;
			const d = await api('/admin/orders/'+oid+'/status', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'refunded' }) });
			if (d.code === 200) { showToast('退款已处理，库存已恢复'); fetchOrders(); } else showToast(d.msg);
		}
		async function viewOrderDetail(oid){
			try{const d=await api('/admin/orders/'+oid);if(d.code===200){const o=d.data;const items=(o.items||[]).map(i=>'<tr><td>'+i.product_name+'</td><td>¥'+i.product_price+'</td><td>×'+i.quantity+'</td><td style="font-weight:700;">¥'+(i.product_price*i.quantity).toFixed(2)+'</td></tr>').join('');
			document.getElementById('modalContent').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>'+T('admin.order_detail_title',{id:o.id})+'</h3><p><b>'+T('user.order_no')+'：</b>'+o.order_no+'</p><p><b>'+T('login.username')+'：</b>'+(o.username||o.user_id)+' ('+(o.user_name||'')+')</p><p><b>状态：</b><span class="badge badge-'+o.status+'">'+(osm[o.status]||o.status)+'</span></p><p><b>'+T('user.addr_name')+'：</b>'+o.receiver_name+' '+o.receiver_phone+'</p><p><b>'+T('user.addr_detail')+'：</b>'+o.receiver_address+'</p><p><b>备注：</b>'+(o.remark||'无')+'</p><p><b>时间：</b>'+new Date(o.created_at).toLocaleString('zh-CN')+'</p><hr style="border-color:#E8F5E9;"><h4>商品明细</h4><table><thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th></tr></thead><tbody>'+items+'</tbody></table><p style="text-align:right;font-size:20px;font-weight:700;color:#E53935;margin-top:12px;">'+T('shop.cart_total')+'：¥'+o.total_amount+'</p>';
			document.getElementById('modalOverlay').classList.add('show')}}catch(e){showToast(T('admin.load_failed'))}
		}
		function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
		document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
		document.addEventListener('langchange',function(){switchPage(document.querySelector('.admin-sidebar a.active').dataset.page);});
		loadDashboard();
	</script>
</body>
</html>
